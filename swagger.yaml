definitions:
  api.AddMemberForm:
    properties:
      email:
        example: newmember@example.com
        format: email
        type: string
    required:
    - email
    type: object
  api.AuthResponse:
    properties:
      access_token:
        type: string
      created:
        type: string
      email:
        type: string
      household:
        $ref: '#/definitions/domain.Household'
      household_id:
        type: string
      id:
        type: string
      image:
        type: string
      name:
        type: string
      recipes:
        items:
          $ref: '#/definitions/domain.Recipe'
        type: array
      refresh_token:
        type: string
      updated:
        type: string
    type: object
  api.CollectionForm:
    properties:
      description:
        type: string
      name:
        minLength: 2
        type: string
    required:
    - name
    type: object
  api.ImportRequest:
    properties:
      update:
        type: boolean
      url:
        type: string
    required:
    - url
    type: object
  api.LoginForm:
    properties:
      email:
        minLength: 6
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  api.MealPlanForm:
    properties:
      date:
        example: "2024-12-25"
        format: date
        type: string
      meal_type:
        enum:
        - breakfast
        - lunch
        - dinner
        example: dinner
        type: string
      note:
        type: string
      recipe_id:
        type: string
      servings:
        example: 4
        minimum: 1
        type: integer
    required:
    - date
    - meal_type
    type: object
  api.RegisterForm:
    properties:
      email:
        minLength: 6
        type: string
      name:
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  api.RenewForm:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  api.ShoppingListForm:
    properties:
      name:
        example: Milk
        type: string
      quantity:
        example: 2
        type: number
      unit_id:
        type: string
    required:
    - name
    type: object
  api.SubscribeRequest:
    properties:
      url:
        type: string
    required:
    - url
    type: object
  api.UpdateCollectionForm:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  api.UpdateHouseholdForm:
    properties:
      name:
        minLength: 2
        type: string
    required:
    - name
    type: object
  api.UpdateMealPlanForm:
    properties:
      date:
        example: "2024-12-26"
        format: date
        type: string
      meal_type:
        enum:
        - breakfast
        - lunch
        - dinner
        example: lunch
        type: string
      note:
        type: string
      recipe_id:
        type: string
      servings:
        example: 2
        minimum: 1
        type: integer
    type: object
  api.UpdateShoppingListForm:
    properties:
      is_bought:
        example: true
        type: boolean
      name:
        example: Organic Milk
        type: string
      quantity:
        example: 1
        type: number
    type: object
  api.UpdateUserForm:
    properties:
      email:
        example: john@example.com
        format: email
        minLength: 6
        type: string
      name:
        example: John Doe
        minLength: 2
        type: string
    type: object
  domain.Author:
    properties:
      description:
        type: string
      image:
        type: string
      name:
        type: string
      url:
        type: string
    type: object
  domain.Collection:
    properties:
      description:
        type: string
      household:
        $ref: '#/definitions/domain.Household'
      household_id:
        type: string
      id:
        type: string
      name:
        type: string
      recipes:
        items:
          $ref: '#/definitions/domain.Recipe'
        type: array
      total_recipes:
        type: integer
      user_id:
        type: string
    type: object
  domain.Feed:
    properties:
      active:
        type: boolean
      created:
        type: string
      error_count:
        type: integer
      id:
        type: string
      name:
        type: string
      publisher:
        $ref: '#/definitions/domain.Publisher'
      recipes:
        items:
          $ref: '#/definitions/domain.Recipe'
        type: array
      retrieved:
        description: last successful retrieval time
        type: string
      total_recipes:
        type: integer
      updated:
        type: string
      url:
        type: string
    type: object
  domain.Food:
    properties:
      default_unit:
        $ref: '#/definitions/domain.Unit'
      default_unit_id:
        type: string
      icon:
        type: string
      id:
        type: string
      name:
        type: string
      taxonomies:
        items:
          $ref: '#/definitions/domain.Taxonomy'
        type: array
    type: object
  domain.Household:
    properties:
      collections:
        items:
          $ref: '#/definitions/domain.Collection'
        type: array
      feeds:
        items:
          $ref: '#/definitions/domain.Feed'
        type: array
      id:
        type: string
      members:
        items:
          $ref: '#/definitions/domain.User'
        type: array
      name:
        type: string
      shopping_lists:
        items:
          $ref: '#/definitions/domain.ShoppingList'
        type: array
    type: object
  domain.MealPlan:
    properties:
      date:
        type: string
      household_id:
        type: string
      id:
        type: string
      meal_type:
        description: breakfast, lunch, dinner
        type: string
      note:
        type: string
      recipe:
        $ref: '#/definitions/domain.Recipe'
      recipe_id:
        type: string
      servings:
        type: integer
    type: object
  domain.Nutrition:
    properties:
      calories:
        description: The number of calories.
        example: 450.5
        type: number
      carbs:
        description: The number of grams of carbohydrates.
        example: 60
        type: number
      carbs_fiber:
        description: The number of grams of fiber.
        example: 4.5
        type: number
      carbs_sugar:
        description: The number of grams of sugar.
        example: 10
        type: number
      cholesterol:
        description: The number of milligrams of cholesterol.
        example: 35
        type: number
      fat:
        description: The number of grams of fat.
        example: 15.2
        type: number
      fat_saturated:
        description: The number of grams of saturated fat.
        example: 5.1
        type: number
      fat_trans:
        description: The number of grams of trans fat.
        example: 0.1
        type: number
      protein:
        description: The number of grams of protein.
        example: 22
        type: number
      serving_size:
        description: The serving size, in terms of the number of volume or mass.
        example: 1 plate
        type: string
      sodium:
        description: The number of milligrams of sodium.
        example: 250
        type: number
    type: object
  domain.Publisher:
    properties:
      description:
        type: string
      id:
        type: string
      image:
        type: string
      name:
        type: string
      total_recipes:
        type: integer
      url:
        type: string
    type: object
  domain.Rating:
    properties:
      count:
        type: integer
      reviews:
        type: integer
      value:
        type: number
    type: object
  domain.Recipe:
    properties:
      author:
        $ref: '#/definitions/domain.Author'
      collections:
        items:
          $ref: '#/definitions/domain.Collection'
        type: array
      cook_time:
        example: 1200
        type: integer
      created:
        format: date-time
        type: string
      description:
        example: A classic Italian pasta dish made with eggs, cheese, pancetta, and
          pepper.
        type: string
      difficulty:
        example: Medium
        type: string
      equipment:
        example:
        - '["Large pot"'
        - ' "Frying pan"]'
        items:
          type: string
        type: array
      feed:
        $ref: '#/definitions/domain.Feed'
      feed_id:
        type: string
      household_id:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/domain.RecipeImage'
        type: array
      ingredients:
        items:
          $ref: '#/definitions/domain.RecipeIngredient'
        type: array
      instructions:
        items:
          $ref: '#/definitions/domain.RecipeInstruction'
        type: array
      is_based_on:
        type: string
      is_saved:
        type: boolean
      language:
        example: en
        type: string
      method:
        example: Stovetop
        type: string
      name:
        example: Spaghetti Carbonara
        type: string
      nutrition:
        $ref: '#/definitions/domain.Nutrition'
      parent_id:
        type: string
      prep_time:
        example: 900
        type: integer
      published:
        format: date-time
        type: string
      publisher:
        $ref: '#/definitions/domain.Publisher'
      rating:
        $ref: '#/definitions/domain.Rating'
      taxonomies:
        items:
          $ref: '#/definitions/domain.Taxonomy'
        type: array
      text:
        type: string
      total_time:
        example: 2100
        type: integer
      updated:
        format: date-time
        type: string
      url:
        type: string
      user_id:
        type: string
      video:
        $ref: '#/definitions/domain.Video'
      yield:
        example: 4
        type: integer
    type: object
  domain.RecipeImage:
    properties:
      caption:
        type: string
      height:
        type: integer
      url:
        type: string
      width:
        type: integer
    type: object
  domain.RecipeIngredient:
    properties:
      amount:
        type: number
      food:
        $ref: '#/definitions/domain.Food'
      food_id:
        type: string
      id:
        type: string
      kind:
        description: '"main", "secondary", "essential"'
        type: string
      note:
        type: string
      raw_text:
        description: original unparsed value
        type: string
      unit:
        $ref: '#/definitions/domain.Unit'
      unit_id:
        type: string
    type: object
  domain.RecipeInstruction:
    properties:
      id:
        type: string
      image:
        type: string
      order:
        type: integer
      parent:
        $ref: '#/definitions/domain.RecipeInstruction'
      parent_id:
        type: string
      text:
        type: string
      title:
        type: string
      url:
        type: string
      video:
        type: string
    type: object
  domain.ShoppingList:
    properties:
      household_id:
        type: string
      id:
        type: string
      is_bought:
        type: boolean
      product:
        type: string
      quantity:
        type: number
      unit:
        $ref: '#/definitions/domain.Unit'
      unit_id:
        type: string
    type: object
  domain.Taxonomy:
    properties:
      canonical:
        $ref: '#/definitions/domain.Taxonomy'
      canonical_id:
        description: For merging/aliases
        type: string
      foods:
        items:
          $ref: '#/definitions/domain.Food'
        type: array
      id:
        type: string
      label:
        type: string
      parent:
        $ref: '#/definitions/domain.Taxonomy'
      parent_id:
        type: string
      recipes:
        items:
          $ref: '#/definitions/domain.Recipe'
        type: array
      slug:
        type: string
      type:
        description: diet, category, cuisine, keyword
        type: string
      units:
        items:
          $ref: '#/definitions/domain.Unit'
        type: array
    type: object
  domain.Unit:
    properties:
      id:
        type: string
      name:
        type: string
      taxonomies:
        items:
          $ref: '#/definitions/domain.Taxonomy'
        type: array
    type: object
  domain.UploadedImage:
    properties:
      height:
        type: integer
      path:
        type: string
      width:
        type: integer
    type: object
  domain.User:
    properties:
      created:
        type: string
      email:
        type: string
      household:
        $ref: '#/definitions/domain.Household'
      household_id:
        type: string
      id:
        type: string
      image:
        type: string
      name:
        type: string
      recipes:
        items:
          $ref: '#/definitions/domain.Recipe'
        type: array
      updated:
        type: string
    type: object
  domain.Video:
    properties:
      content_url:
        type: string
      description:
        type: string
      embed_url:
        type: string
      name:
        type: string
      thumbnail_url:
        type: string
    type: object
  handlers.SuccessMessage:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  sentinels.Error:
    properties:
      fields:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
      status:
        type: integer
    type: object
  types.ListResponse-domain_Collection:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Collection'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_Feed:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Feed'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_MealPlan:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.MealPlan'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_Publisher:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Publisher'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_Recipe:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Recipe'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_ShoppingList:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.ShoppingList'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_Taxonomy:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Taxonomy'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.ListResponse-domain_User:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.User'
        type: array
      meta:
        $ref: '#/definitions/types.Meta'
    type: object
  types.Meta:
    properties:
      page:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
  description: The backend API for Borscht app.
  license:
    name: MIT license
    url: https://opensource.org/license/mit/
  title: Smetana API
  version: "1.0"
paths:
  /_health:
    get:
      consumes:
      - '*/*'
      description: get the status of server.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SuccessMessage'
      summary: Show the status of server.
      tags:
      - root
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user by email and password, returning access and refresh
        tokens.
      parameters:
      - description: Login credentials
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/api.LoginForm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/sentinels.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
      summary: Authenticate user and return tokens.
      tags:
      - auth
  /api/v1/auth/oidc/callback:
    get:
      description: Handles the callback from the identity provider and issues local
        tokens.
      parameters:
      - description: CSRF State
        in: query
        name: state
        required: true
        type: string
      - description: Auth Code
        in: query
        name: code
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/sentinels.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/sentinels.Error'
      summary: OIDC Consumer.
      tags:
      - auth
  /api/v1/auth/oidc/login:
    get:
      description: Redirects the user to the configured OIDC provider.
      responses:
        "302":
          description: Found
      summary: OIDC Initiator.
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using a valid refresh token.
      parameters:
      - description: Refresh token
        in: body
        name: refresh
        required: true
        schema:
          $ref: '#/definitions/api.RenewForm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/sentinels.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
      summary: Refresh access token.
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with name, email, and password. Creates an
        associated personal Household.
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/api.RegisterForm'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/sentinels.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/sentinels.Error'
      summary: Create a new user.
      tags:
      - auth
  /api/v1/collections:
    get:
      consumes:
      - '*/*'
      description: Returns collections associated with the user's household.
      parameters:
      - description: Text search
        in: query
        name: q
        type: string
      - description: 'Comma-separated extras to include: recipes:5, recipes.images
          and total_recipes'
        in: query
        name: preload
        type: string
      - description: 'Sort by field: id, name, created, updated (default: id)'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc or desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Offset for pagination (alternative to page)
        in: query
        name: offset
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.ListResponse-domain_Collection'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
      security:
      - ApiKeyAuth: []
      summary: List user's collections.
      tags:
      - collections
    post:
      consumes:
      - application/json
      description: Create a new recipe collection for the current household.
      parameters:
      - description: Collection data
        in: body
        name: collection
        required: true
        schema:
          $ref: '#/definitions/api.CollectionForm'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Collection'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/sentinels.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
      security:
      - ApiKeyAuth: []
      summary: Create a new collection.
      tags:
      - collections
  /api/v1/collections/{id}:
    delete:
      consumes:
      - '*/*'
      description: Delete a collection.
      parameters:
      - description: Collection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/sentinels.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/sentinels.Error'
      security:
      - ApiKeyAuth: []
      summary: Delete collection.
      tags:
      - collections
    get:
      consumes:
      - '*/*'
      parameters:
      - description: Collection ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Collection'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/sentinels.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/sentinels.Error'
      security:
      - ApiKeyAuth: []
      summary: Returns a collection with all its recipes.
      tags:
      - collections
    patch:
      consumes:
      - application/json
      description: Rename collection or manage its recipes.
      parameters:
      - description: Collection ID
        in: path
        name: id
        required: true
        type: string
      - description: Collection update data
        in: body
        name: collection
        required: true
        schema:
          $ref: '#/definitions/api.UpdateCollectionForm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Collection'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/sentinels.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/sentinels.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/sentinels.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/sentinels.Error'
      security:
      - ApiKeyAuth: []
      summary: Update collection.
      tags:
      - collections
  /api/v1/collections/{id}/recipes:
    get:
      consumes:
      - application/json
      description: Returns recipes in a collection with optional search, pagination
        and extras.
      parameters:
      - description: Text search
        in: query
        name: q
        type: string
      - description: 'Comma-separated extras to include: publisher, feed, images,
          ingredients, instructions, taxonomies, collections and saved'
        in: query
        name: preload
        type: string
      - description: 'Sort by field: id, name, created, updated (default: id)'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc or desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Offset for pagination (alternative to page)
        in: query
        name: offset
        type: integer
      - description: Items per page
        in: query
        name: limit
